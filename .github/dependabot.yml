: 2
updates:
  # Mise à jour des Actions GitHub
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly" # Peut être daily, weekly ou monthly

  # Mise à jour des dépendances (ex: npm, pip, gomod)
  - package-ecosystem: "npm" # Remplacez par votre écosystème
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dependencies: # Nom du groupe (libre)
        patterns:
          - "*" # Regroupe TOUTES les dépendances dans une seule PR
